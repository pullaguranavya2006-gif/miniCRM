<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini CRM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📋 Client Lead Management System</h1>

    <div class="dashboard">
        <div class="card1">
            <h3>Total Leads</h3>
            <p id="totalLeads">0</p>
        </div>

        <div class="card1">
            <h3>Contacted</h3>
            <p id="contactedLeads">0</p>
        </div>

        <div class="card1">
            <h3>Converted</h3>
            <p id="convertedLeads">0</p>
        </div>
    </div>

    <form id="leadForm">

        <input
            type="text"
            id="name"
            placeholder="Client Name"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Client Email"
            required
        >

        <input
            type="text"
            id="source"
            placeholder="Lead Source"
            required
        >

        <select id="status">
            <option value="New">New</option>
            <option value="Contacted">Contacted</option>
            <option value="Converted">Converted</option>
        </select>

        <textarea
            id="notes"
            placeholder="Notes"
        ></textarea>

        <button type="submit">
            Add Lead
        </button>

    </form>

    <h2>Lead Records</h2>

    <div id="leadList"></div>

</div>

<script src="script.js"></script>

</body>
</html>
